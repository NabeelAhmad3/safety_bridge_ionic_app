<ion-header>
  <ion-toolbar color="primary">
    <ion-title>My Profile</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding" *ngIf="profile">
  <div class="ion-text-center ion-padding">
    <ion-icon name="person-circle" style="font-size: 80px; color: var(--ion-color-primary)"></ion-icon>
    <h2>{{ profile.name }}</h2>
    <p>{{ profile.email }}</p>
    <ion-badge color="primary">{{ profile.role | titlecase }}</ion-badge>
  </div>

  <ion-list>
    <ion-item>
      <ion-label><strong>Name:</strong> {{ profile.name }}</ion-label>
    </ion-item>
    <ion-item>
      <ion-label><strong>Email:</strong> {{ profile.email }}</ion-label>
    </ion-item>
    <ion-item>
      <ion-label><strong>Role:</strong> {{ profile.role | titlecase }}</ion-label>
    </ion-item>
  </ion-list>

  <ion-button expand="block" color="danger" class="ion-margin-top" (click)="logout()">
    Logout
  </ion-button>
</ion-content>
