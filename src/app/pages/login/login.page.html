<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Safety Bridge - Login</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-item>
    <ion-label position="floating">Email</ion-label>
    <ion-input [(ngModel)]="email" type="email"></ion-input>
  </ion-item>

  <ion-item>
    <ion-label position="floating">Password</ion-label>
    <ion-input [(ngModel)]="password" type="password"></ion-input>
  </ion-item>

  <p color="danger" *ngIf="error">{{ error }}</p>

  <ion-button expand="block" class="ion-margin-top" (click)="login()" [disabled]="loading">
    {{ loading ? 'Logging in...' : 'Login' }}
  </ion-button>

  <ion-button expand="block" fill="clear" routerLink="/register">
    Don't have an account? Register
  </ion-button>
</ion-content>
